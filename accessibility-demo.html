<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Short Filter Accessibility Demo</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f4f7fc; color: #0f172a; }
    main { max-width: 900px; margin: 0 auto; padding: 32px 20px 48px; }
    .card { background: white; border-radius: 20px; padding: 24px; box-shadow: 0 8px 30px rgba(15,23,42,.08); }
    img { width: min(100%, 420px); display: block; margin: 24px auto; border-radius: 20px; }
    h1 { margin: 0 0 12px; }
    li { margin: 8px 0; }
    code { background: #eaf1ff; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>Short Filter Accessibility Demo</h1>
      <p>Google Play Console の <strong>ユーザー補助サービス申告</strong> 用に、認識しやすい開示と同意の流れをまとめた短いデモです。</p>
      <img src="assets/accessibility-disclosure-demo.gif" alt="Short Filter accessibility disclosure demo">
      <ul>
        <li>初回起動で開示を表示</li>
        <li>同意してから Accessibility 設定へ進む</li>
        <li>同意しない場合の分岐を用意</li>
        <li>ホーム画面から説明を再表示できる</li>
      </ul>
      <p>公開 URL: <code>https://ritonobi0120-tech.github.io/short-filter-privacy-site/accessibility-demo.html</code></p>
    </div>
  </main>
</body>
</html>
